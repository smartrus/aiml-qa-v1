<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser / product window -->
  <rect x="2" y="4" width="20" height="16" rx="2"
    stroke="#7c3aed" stroke-width="1.5" fill="rgba(124,58,237,0.06)"/>
  <!-- Browser header bar -->
  <line x1="2" y1="9" x2="22" y2="9"
    stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Three window dots -->
  <circle cx="5.5" cy="6.5" r="0.9" fill="#7c3aed"/>
  <circle cx="8.5" cy="6.5" r="0.9" fill="#7c3aed"/>
  <circle cx="11.5" cy="6.5" r="0.9" fill="#7c3aed"/>
  <!-- Checkmark in content area -->
  <polyline points="7.5,14 10,17 16.5,12"
    stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
