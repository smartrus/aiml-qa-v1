<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Credit card / banking -->
  <rect x="2" y="5" width="20" height="14" rx="2"
    stroke="#7c3aed" stroke-width="1.5" fill="rgba(124,58,237,0.06)"/>
  <line x1="2" y1="10" x2="22" y2="10"
    stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Trend-up line (AI performance / value growth) -->
  <polyline points="5,16 8,14 11,15 15,11 18,12"
    stroke="#7c3aed" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Upward arrow at end -->
  <polyline points="16.5,10.5 18,12 19.5,10.5"
    stroke="#7c3aed" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
