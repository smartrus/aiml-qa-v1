<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Scales of justice -->
  <!-- Central pole -->
  <line x1="12" y1="3" x2="12" y2="20" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="8" y1="20" x2="16" y2="20" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="5" y1="7" x2="19" y2="7" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left pan chain + pan -->
  <line x1="5"  y1="7" x2="5"  y2="13" stroke="#7c3aed" stroke-width="1.2" opacity="0.7"/>
  <path d="M2.5,13 Q5,16 7.5,13" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" fill="rgba(124,58,237,0.08)"/>
  <!-- Right pan chain + pan (slightly lower = unbalanced/being tested) -->
  <line x1="19" y1="7" x2="19" y2="14.5" stroke="#7c3aed" stroke-width="1.2" opacity="0.7"/>
  <path d="M16.5,14.5 Q19,17.5 21.5,14.5" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" fill="rgba(124,58,237,0.08)"/>
</svg>
